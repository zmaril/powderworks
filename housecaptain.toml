[[member]]
repo = "zmaril/Straitjacket"

[[member]]
repo = "zmaril/powdermonkey"

[[member]]
repo = "zmaril/fluessig"
note = "entl's schema tool, extracted into its own project"

[[member]]
repo = "zmaril/disponent"
note = "dispatch work to coding agents; exe.dev + local tmux backends"

[[member]]
repo = "zmaril/entl"
note = "pre-release, in flux — schema, CLI, and docs still changing"

[policy.checks]
conventional-commits = "required"
stray-todos = "required"  # todos live in the todo file, fleet-wide

[[policy.required-file]]
path = "notes/design.md"
scope = "public"

# stray-todos severity is locked (members can't downgrade it), but its `ignore`
# list is left per-member: a repo that legitimately embeds marker-like strings
# (housekeeping's own test fixtures) needs its own [stray-todos] ignore.
[policy]
locked = ["checks.stray-files", "stray-files.allow", "checks.stray-todos"]

# Fleet-owned configs. The canonical copies live under .fleet/ here; a merge
# that touches them fans out an isolated PR to each member via fleet-sync.yml.
[[policy.managed-config]]
check = "stylelint"
paths = { ".stylelintrc.json" = ".fleet/stylelintrc.json" }

[[policy.managed-config]]
check = "vale"
paths = { ".vale.ini" = ".fleet/vale/.vale.ini", "styles/" = ".fleet/vale/styles/" }

[[policy.managed-config]]
check = "codespell"
paths = { ".codespellrc" = ".fleet/codespell/.codespellrc" }
