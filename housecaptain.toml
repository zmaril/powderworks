name = "powderworks"
captain = "zmaril/powderworks"

[[member]]
repo = "zmaril/powderworks"

[[member]]
repo = "zmaril/housekeeping"

[[member]]
repo = "zmaril/Straitjacket"

[[member]]
repo = "zmaril/powdermonkey"

[[member]]
repo = "zmaril/fluessig"
note = "entl's schema tool, extracted into its own project"

[[member]]
repo = "zmaril/disponent"
note = "dispatch work to coding agents; exe.dev + local tmux backends"

[[member]]
repo = "zmaril/logref"
note = "design spec for a searchable reference of database log/error messages"

[[member]]
repo = "zmaril/entl"
note = "pre-release, in flux — schema, CLI, and docs still changing"

[policy.checks]
conventional-commits = "required"
stray-todos = "required"  # todos live in the todo file, fleet-wide
coverage = "required"  # presence check: every coverage-lang member wires a tool, fleet-wide

[[policy.required-file]]
path = "notes/design.md"
scope = "public"

# stray-todos severity is locked (members can't downgrade it), but its `ignore`
# list is left per-member: a repo that legitimately embeds marker-like strings
# (housekeeping's own test fixtures) needs its own [stray-todos] ignore.
[policy]
locked = ["checks.stray-files", "stray-files.allow", "checks.stray-todos", "checks.coverage"]

# Fleet-owned configs. The canonical copies live under .fleet/ here; a merge
# that touches them fans out an isolated PR to each member via fleet-sync.yml.
[[policy.managed-config]]
check = "stylelint"
paths = { ".stylelintrc.json" = ".fleet/stylelintrc.json" }

[[policy.managed-config]]
check = "vale"
paths = { ".vale.ini" = ".fleet/vale/.vale.ini", "styles/" = ".fleet/vale/styles/" }

[[policy.managed-config]]
check = "codespell"
paths = { ".codespellrc" = ".fleet/codespell/.codespellrc" }

# biome is only used by some members, so these entries carry an `only` allow-list
# (owner/repo, matching [[member]].repo exactly). The captain owns a shared BASE
# config; each member keeps its own unmanaged biome.json that pulls the base in
# with biome `extends` + local deltas — so the byte-identical sync only ever
# touches the base file, never the member's own tuned config.
[[policy.managed-config]]
check = "biome"
only = ["zmaril/powdermonkey"]
paths = { "biome.base.json" = ".fleet/biome/base.json" }

[[policy.managed-config]]
check = "biome"
only = ["zmaril/entl", "zmaril/Straitjacket"]
paths = { "site/biome.base.json" = ".fleet/biome/site.json" }
