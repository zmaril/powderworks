name: housecaptain
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Mondays, after the members' own weekly self-audits
  workflow_dispatch:

jobs:
  captain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: zmaril/housekeeping@v1
        with:
          captain: housecaptain.toml
