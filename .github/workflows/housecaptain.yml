name: housecaptain
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # Mondays, after the members' own weekly self-audits
  workflow_dispatch:
    inputs:
      dispatch:
        description: also trigger every member's self-audit now
        type: boolean
        default: false

jobs:
  captain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: zmaril/housekeeping@v0.9.0
        with:
          captain: housecaptain.toml
          dispatch: ${{ inputs.dispatch || '' }}
