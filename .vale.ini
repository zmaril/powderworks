# straitjacket-allow-file[:duplication] — fleet-synced verbatim; identical copies are intentional
StylesPath = styles
MinAlertLevel = suggestion

Vocab = Powderworks
Packages = proselint

[*.md]
BasedOnStyles = Vale, proselint
# Spelling is codespell's job (see .fleet/codespell) — Vale's dictionary
# spell-check false-positives on every unknown jargon word. Keep Vale.Terms,
# which powers the Powderworks vocabulary's terminology enforcement.
Vale.Spelling = NO
# proselint rules too noisy on technical docs: Typography reads (a)/(b)/(c)
# option labels as copyright symbols; Annotations flags intentional NOTE:/TODO:;
# Cliches/Very fire on ordinary prose. All produced only false positives.
proselint.Typography = NO
proselint.Annotations = NO
proselint.Cliches = NO
proselint.Very = NO

# notes/ is working design scratch — coined names/jargon there aren't prose to
# lint. codespell skips ./notes too (see .fleet/codespell).
[notes/**]
BasedOnStyles =
