logo = "site/public/logos/powderworks.png"  # fleet dashboard logo
fleet = "zmaril/powderworks"

[checks]
# powderworks.dev is live and the site code lives here now
website = "required"
ci-exists = "required"
# ci-green gates on main being green, but on a fresh repo that's a bootstrap
# deadlock (housekeeping <-> captain <-> fleet-sync are red only via each
# other). Keep it advisory so main can converge. See housekeeping#56.
ci-green = "recommended"
conventional-commits = "required"
[allow-auto-merge]
# Auto-merge is enabled on the repo so a green PR can land without a babysitter.
# The check asserts GitHub's allow_auto_merge matches this declaration.
enabled = true
